<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Portal | Select Your Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .portal-container {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 12px;
      color: rgba(0, 212, 255, 0.5);
      margin-top: -1.5rem;
      text-transform: uppercase;
    }

    .selection-grid {
      display: flex;
      gap: 2.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-card {
      width: 320px;
      height: 400px;
      background: linear-gradient(145deg, #0e0e2e, #131340);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 24px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .game-card:hover {
      transform: translateY(-15px) scale(1.02);
      border-color: var(--neon-blue);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 212, 255, 0.3);
    }

    .game-card:hover::before { opacity: 1; }

    .game-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 15px currentColor);
    }

    .icon-ttt { color: var(--neon-pink); }
    .icon-maze { color: var(--neon-blue); }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .game-desc {
      font-size: 0.8rem;
      color: #777;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    .footer-status {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #444;
      text-transform: uppercase;
    }

    #loading-bar {
      width: 200px;
      height: 2px;
      background: #111;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }
    #loading-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--neon-blue);
      animation: scan 2s infinite;
    }
    @keyframes scan {
      to { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="portal-container">
    <div>
      <h1>CYBER PORTAL</h1>
      <div class="subtitle">Neural Interface Active</div>
    </div>

    <div class="selection-grid">
      <a href="tictactoe.html" class="game-card">
        <div class="game-icon icon-ttt">╳</div>
        <div>
          <div class="game-title">TIC-TAC-TOE</div>
          <p class="game-desc">Strategic matrix combat. Classical algorithm testing module.</p>
        </div>
        <button class="btn-primary" style="width: 100%;">BOOT MODULE</button>
      </a>

      <a href="maze.html" class="game-card">
        <div class="game-icon icon-maze">◈</div>
        <div>
          <div class="game-title">MAZE RUNNER</div>
          <p class="game-desc">Randomized spatial bypass. Perfect grid sequence generation.</p>
        </div>
        <button class="btn-primary" style="width: 100%; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);">BOOT MODULE</button>
      </a>
    </div>

    <div class="footer-status">
      SYSTEM STATUS: OPTIMAL
      <div id="loading-bar"></div>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script>
    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        SFX.click();
      });
    });
  </script>
</body>
</html>
